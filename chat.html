<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaBot Chat Interface</title>
    <style>
        /* Dark theme variables */
        :root {
            --bg-color: #1a1a1a;
            --chat-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --input-bg: #3d3d3d;
            --border-color: #404040;
            --button-bg: #4CAF50;
            --button-hover: #45a049;
            --accent-color: #4CAF50;
            --message-user-bg: #3d3d3d;
            --message-ai-bg: #4a4a4a;
            --header-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
        }

        /* Chat section (left 1/3) */
        .chat-section {
            width: 33.33%;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            position: relative;
        }

        /* Header with logo */
        .chat-header {
            height: var(--header-height);
            padding: 0.8rem 1rem;
            background-color: var(--chat-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .chat-header img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .chat-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-color);
        }

        /* Message history area */
        .message-history {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            line-height: 1.4;
            max-width: 85%;
            word-wrap: break-word;
            position: relative;
            font-size: 0.95rem;
        }

        .message.user-message {
            background-color: var(--message-user-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.ai-message {
            background-color: var(--message-ai-bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Input area */
        .input-area {
            padding: 1rem;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 0.8rem;
            position: relative;
        }

        .input-area input {
            flex-grow: 1;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .input-area button {
            padding: 0.8rem 1.2rem;
            background-color: var(--button-bg);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: 500;
        }

        .input-area button:hover {
            background-color: var(--button-hover);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: none;
            margin: 1rem auto;
            width: 30px;
            height: 30px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Disable input and button while loading */
        .input-area.loading input,
        .input-area.loading button {
            opacity: 0.7;
            pointer-events: none;
        }

        /* IFrame section (right 2/3) */
        .iframe-section {
            width: 66.67%;
            height: 100%;
        }

        .iframe-section iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: var(--chat-bg);
        }

        /* New styles for streaming updates */
        .stream-updates {
            font-size: 0.8rem;
            color: #8e8e8e;
            margin-top: 5px;
            font-style: italic;
        }

        .node-update {
            margin-bottom: 3px;
            padding: 2px 5px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 3px;
        }

        /* Enhanced streaming styles */
        .workflow-progress {
            margin-top: 12px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            padding-top: 8px;
        }
        
        .workflow-progress-title {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--accent-color);
            font-size: 0.75rem;
            cursor: pointer;
        }
        
        .workflow-progress-title:after {
            content: "▼";
            font-size: 8px;
            margin-left: auto;
            transition: transform 0.2s;
        }
        
        .workflow-progress.collapsed .workflow-progress-title:after {
            transform: rotate(-90deg);
        }
        
        .workflow-progress.collapsed .nodes-container {
            display: none;
        }
        
        .node {
            margin-bottom: 8px;
            border-left: 2px solid rgba(76, 175, 80, 0.3);
            padding-left: 8px;
        }
        
        .node-header {
            display: flex;
            align-items: center;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .node-header .node-badge {
            background: rgba(76, 175, 80, 0.2);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-right: 6px;
            color: var(--accent-color);
        }
        
        .node-header .node-title {
            font-size: 0.8rem;
        }
        
        .node-content {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 6px 8px;
            margin-left: 4px;
            color: rgba(255, 255, 255, 0.8);
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .node-active {
            border-left-color: var(--accent-color);
        }
        
        .node-complete {
            border-left-color: rgba(76, 175, 80, 0.7);
        }
        
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            margin-left: 4px;
        }
        
        .typing-indicator span {
            height: 4px;
            width: 4px;
            margin: 0 1px;
            background: var(--accent-color);
            display: block;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .typing-indicator span:nth-child(1) {
            animation: bounce 1s infinite 0s;
        }
        
        .typing-indicator span:nth-child(2) {
            animation: bounce 1s infinite 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation: bounce 1s infinite 0.4s;
        }
        
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        .ai-response-content {
            margin-bottom: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
            color: var(--text-color);
            white-space: pre-wrap;
        }

        .typing-dots span {
            opacity: 0;
            animation: typingDot 1.4s infinite;
            display: inline-block;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingDot {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="chat-section">
        <div class="chat-header">
            <img src="https://service-jobs-images.s3.us-east-2.amazonaws.com/7rl98t1weu387r43il97h6ipk1l7" alt="LlamaBot Logo">
            <h1>LlamaBot</h1>
        </div>
        <div class="message-history">
            <div class="message ai-message">Hi! I'm LlamaBot. How can I help you today?</div>
            <div class="loading-spinner"></div>
        </div>
        <div class="input-area">
            <input type="text" placeholder="Type your message..." id="messageInput">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <div class="iframe-section">
        <iframe src="http://localhost:8000/page" title="Content Frame"></iframe>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const messageText = input.value.trim();
            
            if (messageText) {
                const messageHistory = document.querySelector('.message-history');
                const inputArea = document.querySelector('.input-area');
                const spinner = document.querySelector('.loading-spinner');
                const iframe = document.querySelector('.iframe-section iframe');
                
                // Show loading state
                spinner.style.display = 'block';
                inputArea.classList.add('loading');
                
                // Add user message to the UI
                const newMessage = document.createElement('div');
                newMessage.className = 'message user-message';
                newMessage.textContent = messageText;
                messageHistory.appendChild(newMessage);
                
                // Clear input field
                input.value = '';
                
                // Create a placeholder for the AI response with better structure
                const aiResponsePlaceholder = document.createElement('div');
                aiResponsePlaceholder.className = 'message ai-message';
                
                // Create a container for the actual AI response content (this is the main visible part)
                const responseContent = document.createElement('div');
                responseContent.className = 'ai-response-content';
                responseContent.innerHTML = 'I\'m working on your request<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
                aiResponsePlaceholder.appendChild(responseContent);
                
                // Add placeholder for workflow visualization (collapsible)
                const workflowProgress = document.createElement('div');
                workflowProgress.className = 'workflow-progress collapsed'; // Start collapsed
                workflowProgress.innerHTML = `
                    <div class="workflow-progress-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 6V12L16 14" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>View processing details</span>
                    </div>
                    <div class="nodes-container"></div>
                `;
                aiResponsePlaceholder.appendChild(workflowProgress);
                
                // Add click handler to toggle workflow details
                workflowProgress.querySelector('.workflow-progress-title').addEventListener('click', () => {
                    workflowProgress.classList.toggle('collapsed');
                });
                
                messageHistory.appendChild(aiResponsePlaceholder);
                
                // Track the nodes we've seen
                const processedNodes = new Set();
                let currentActiveNode = null;
                
                try {
                    // Set up fetch for streaming
                    const response = await fetch('http://localhost:8000/chat-message', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ message: messageText })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    // Set up the reader for the stream
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    
                    // Process the stream
                    while (true) {
                        const { done, value } = await reader.read();
                        
                        if (done) {
                            break;
                        }
                        
                        // Decode the chunk and add to buffer
                        buffer += decoder.decode(value, { stream: true });
                        
                        // Process complete lines in the buffer
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || ''; // Keep the last incomplete line in the buffer
                        
                        for (const line of lines) {
                            if (line.trim() === '') continue;
                            
                            try {
                                const data = JSON.parse(line);
                                
                                if (data.type === 'start') {
                                    console.log('Stream started:', data.request_id);
                                } 
                                else if (data.type === 'update') {
                                    console.log(`Update from ${data.node}:`, data.value);
                                    
                                    // Get the nodes container
                                    const nodesContainer = aiResponsePlaceholder.querySelector('.nodes-container');
                                    
                                    // Check if we have a valid node name
                                    if (!data.node) {
                                        console.error("Missing node name in update:", data);
                                        return; // Skip this update
                                    }
                                    
                                    // If this is a new node, create its container
                                    if (!processedNodes.has(data.node)) {
                                        // If there was a previously active node, mark it as complete
                                        if (currentActiveNode) {
                                            currentActiveNode.classList.remove('node-active');
                                            currentActiveNode.classList.add('node-complete');
                                        }
                                        
                                        const nodeElement = document.createElement('div');
                                        nodeElement.className = 'node node-active';
                                        nodeElement.id = `node-${data.node}`;
                                        currentActiveNode = nodeElement;
                                        
                                        nodeElement.innerHTML = `
                                            <div class="node-header">
                                                <span class="node-badge">${processedNodes.size + 1}</span>
                                                <span class="node-title">${formatNodeName(data.node)}</span>
                                            </div>
                                            <div class="node-content"></div>
                                        `;
                                        
                                        nodesContainer.appendChild(nodeElement);
                                        processedNodes.add(data.node);
                                    }
                                    
                                    // Update the node's content with the latest data
                                    const nodeContent = aiResponsePlaceholder.querySelector(`#node-${data.node} .node-content`);
                                    if (!nodeContent) {
                                        console.error("Could not find node content element for:", data.node);
                                        return; // Skip if we can't find the node content element
                                    }
                                    
                                    // Parse the value to detect if it contains messages or other structured data
                                    let parsedValue = data.value;
                                    try {
                                        // Check if the value is stringified JSON
                                        if (data.value.startsWith('{') || data.value.startsWith('[')) {
                                            const parsed = JSON.parse(data.value);
                                            parsedValue = parsed;
                                            
                                            // Check if this contains messages
                                            if (parsed.messages && Array.isArray(parsed.messages)) {
                                                // Extract the last message content for display
                                                const lastMsg = parsed.messages[parsed.messages.length - 1];
                                                if (lastMsg && lastMsg.content) {
                                                    // Update the main response area with the message content
                                                    responseContent.innerHTML = lastMsg.content.replace(/\n/g, '<br>');
                                                }
                                            }
                                        }
                                    } catch (e) {
                                        // Not valid JSON, continue with string value
                                        console.log("Not JSON:", e);
                                    }
                                    
                                    // Format the content based on the node type and structure
                                    const formattedValue = formatNodeValue(data.node, data.value);
                                    nodeContent.innerHTML = formattedValue;
                                    
                                    // Check if this update contains an actual readable message to display
                                    if (typeof parsedValue === 'string' && parsedValue.includes('HumanMessage(content=')) {
                                        // Try to extract content from the string representation
                                        const contentMatch = parsedValue.match(/content='([^']+)'/);
                                        if (contentMatch && contentMatch[1]) {
                                            // Display the extracted message content
                                            responseContent.innerHTML = contentMatch[1].replace(/\n/g, '<br>');
                                        }
                                    }
                                    // For specific nodes, update the main response area with actual AI content
                                    else if (data.node === "respond_naturally") {
                                        // For natural responses, directly show the AI's message as it comes in
                                        responseContent.innerHTML = formattedValue;
                                    } else if (data.node === "write_html_code") {
                                        // For HTML code, show "Creating your page..."
                                        responseContent.textContent = "Creating your web page...";
                                    } else if (!responseContent.innerHTML.includes('<br>')) {
                                        // Only update if we haven't already set content from a message
                                        responseContent.textContent = `Working on: ${formatNodeName(data.node)}`;
                                    }
                                    
                                    // Scroll to the latest update
                                    messageHistory.scrollTop = messageHistory.scrollHeight;
                                } 
                                else if (data.type === 'final') {
                                    // Mark the last active node as complete
                                    if (currentActiveNode) {
                                        currentActiveNode.classList.remove('node-active');
                                        currentActiveNode.classList.add('node-complete');
                                    }
                                    
                                    // Change the workflow progress title to "Completed"
                                    const progressTitle = aiResponsePlaceholder.querySelector('.workflow-progress-title');
                                    progressTitle.innerHTML = `
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M22 11.0857V12.0057C21.9988 14.1621 21.3005 16.2604 20.0093 17.9875C18.7182 19.7147 16.9033 20.9782 14.8354 21.5896C12.7674 22.201 10.5573 22.1276 8.53447 21.3803C6.51168 20.633 4.78465 19.2518 3.61096 17.4428C2.43727 15.6338 1.87979 13.4938 2.02168 11.342C2.16356 9.19029 2.99721 7.14205 4.39828 5.5028C5.79935 3.86354 7.69279 2.72111 9.79619 2.24587C11.8996 1.77063 14.1003 1.98806 16.07 2.86572" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                            <path d="M22 4L12 14.01L9 11.01" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                        <span>Processing complete</span>
                                    `;
                                    
                                    // Display the final message content
                                    if (data.messages && data.messages.length > 0) {
                                        // Get the last message (most recent)
                                        const lastMessage = data.messages[data.messages.length - 1];
                                        
                                        // Extract the content - this should already be properly serialized from server
                                        if (lastMessage.content) {
                                            responseContent.innerHTML = lastMessage.content.replace(/\n/g, '<br>');
                                        } else if (typeof lastMessage === 'string') {
                                            // Handle case where it's a string
                                            responseContent.innerHTML = lastMessage.replace(/\n/g, '<br>');
                                        } else {
                                            // Try to stringify and extract what we can
                                            try {
                                                const messageStr = JSON.stringify(lastMessage);
                                                if (messageStr.includes('content')) {
                                                    const contentMatch = messageStr.match(/"content":"([^"]+)"/);
                                                    if (contentMatch && contentMatch[1]) {
                                                        responseContent.innerHTML = contentMatch[1].replace(/\\n/g, '<br>');
                                                    } else {
                                                        responseContent.innerHTML = messageStr;
                                                    }
                                                } else {
                                                    responseContent.innerHTML = messageStr;
                                                }
                                            } catch (e) {
                                                responseContent.textContent = "Received response, but couldn't format it properly.";
                                                console.error("Error processing final message:", e);
                                            }
                                        }
                                    }
                                    
                                    // Refresh the iframe if HTML was updated
                                    setTimeout(() => {
                                        iframe.src = iframe.src;
                                    }, 100);
                                } 
                                else if (data.type === 'error') {
                                    aiResponsePlaceholder.textContent = `Error: ${data.error}`;
                                    aiResponsePlaceholder.style.color = '#ff6b6b';
                                }
                            } catch (e) {
                                console.error('Error parsing stream data:', e, line);
                            }
                        }
                    }
                    
                } catch (error) {
                    aiResponsePlaceholder.textContent = `Error: ${error.message}`;
                    aiResponsePlaceholder.style.color = '#ff6b6b';
                } finally {
                    spinner.style.display = 'none';
                    inputArea.classList.remove('loading');
                    messageHistory.scrollTop = messageHistory.scrollHeight;
                }
            }
        }

        // Allow Enter key to send message
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Add these helper functions at the end of your script
        function formatNodeName(nodeName) {
            // Convert camelCase or snake_case to Title Case with spaces
            return nodeName
                .replace(/_/g, ' ')
                .replace(/([A-Z])/g, ' $1')
                .replace(/^\w/, c => c.toUpperCase());
        }

        function formatNodeValue(nodeName, value) {
            // Check if value contains message objects (like HumanMessage instances)
            if (value.includes('HumanMessage(content=')) {
                // Try to extract the content
                const contentMatch = value.match(/content='([^']+)'/);
                if (contentMatch && contentMatch[1]) {
                    return contentMatch[1].replace(/\n/g, '<br>');
                }
            }
            
            // Try to determine if this is JSON
            try {
                // If it looks like a stringified object or contains certain patterns
                if ((value.startsWith('{') && value.endsWith('}')) || 
                    (value.startsWith('[') && value.endsWith(']'))) {
                    const parsed = JSON.parse(value);
                    
                    // Special handling for message objects in JSON
                    if (parsed.messages && Array.isArray(parsed.messages)) {
                        const lastMessage = parsed.messages[parsed.messages.length - 1];
                        if (lastMessage && lastMessage.content) {
                            return lastMessage.content.replace(/\n/g, '<br>');
                        }
                    }
                    
                    return `<pre>${JSON.stringify(parsed, null, 2)}</pre>`;
                }
            } catch (e) {
                // Not JSON or couldn't parse, continue with normal formatting
            }
            
            // For route_initial_user_message node, show a special display
            if (nodeName === 'route_initial_user_message') {
                return `<div>Determined intent: <strong>${value}</strong></div>`;
            }
            
            // For design_and_plan node, format as bullet points if possible
            if (nodeName === 'design_and_plan') {
                // Check if it contains list-like patterns
                if (value.includes('\n-') || value.includes('\n•') || value.includes('\n1.')) {
                    return value
                        .split('\n')
                        .map(line => {
                            if (line.trim().startsWith('-') || line.trim().startsWith('•') || /^\d+\./.test(line.trim())) {
                                return `<li>${line.trim().replace(/^[-•]\s*/, '')}</li>`;
                            }
                            return line;
                        })
                        .join('\n')
                        .replace(/<li>/g, '<ul><li>')
                        .replace(/<\/li>\n<li>/g, '</li><li>')
                        .replace(/<\/li>\n/g, '</li></ul>\n');
                }
            }
            
            // Default handling: escape HTML and preserve line breaks
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
